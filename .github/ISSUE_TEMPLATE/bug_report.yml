name: Bug report
description: Report a reproducible problem using synthetic or redacted data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include real secrets, credentials, private code, or customer data. Report security vulnerabilities privately through the Security tab.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use a minimal example containing only synthetic or redacted data.
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ContextLock version
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node.js version, pnpm version, and MCP client.
      placeholder: macOS 15, Node 22, pnpm 11, Codex
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove all secrets and private paths before pasting logs.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I confirm this report contains no real secrets, private code, or customer data.
          required: true
