name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1. Must match package.json version."
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease."
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:skill
      - run: pnpm test:mcp
      - run: pnpm pack --dry-run

      - name: Validate release tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="$(node -p "require('./package.json').version")"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v0.1.1 or v1.0.0-beta.1."
            exit 1
          fi

          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "Tag $TAG does not match package.json version v$VERSION."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          FLAGS=()
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            FLAGS+=(--prerelease)
          fi

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "ContextLock $TAG" \
            --generate-notes \
            "${FLAGS[@]}"
